name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build-train-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python train.py

    - name: Check Model File Exists
      run: |
        test -f model/model.pkl

    - name: Run Basic API Test
      run: |
        pip install requests
        uvicorn app:app --host 127.0.0.1 --port 8000 &
        sleep 5
        python -c "
import requests
data = {
    'MonthlyCharges': 80,
    'tenure': 5,
    'ticket_7d': 2,
    'ticket_30d': 6,
    'ticket_90d': 10,
    'sentiment': -0.5,
    'monthly_change': 10
}
r = requests.post('http://127.0.0.1:8000/predict', json=data)
print(r.json())
assert 'churn_prediction' in r.json()
"

  docker-build-push:
    needs: build-train-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-ml:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/churn-ml:latest
